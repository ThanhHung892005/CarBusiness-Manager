# ========================
# Application Info
# ========================
spring.application.name=car-management-system
server.port=9090
server.servlet.context-path=/

# ========================
# Database (override in application-dev.properties)
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/car_management}
spring.datasource.username=${DB_USERNAME:caruser}
spring.datasource.password=${DB_PASSWORD:carpassword123}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=CarMgmtPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# JPA / Hibernate
# ========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================
# Flyway Migration
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ========================
# Spring Security
# ========================
spring.security.remember-me.token-validity-seconds=604800

# ========================
# Thymeleaf
# ========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ========================
# File Upload
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:uploads/vehicles}

# ========================
# Email (override in application-dev.properties)
# ========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@carmanagement.com}

# ========================
# Session
# ========================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ========================
# Logging
# ========================
logging.level.com.carmanagement=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================
# Actuator (optional)
# ========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ========================
# App Custom Config
# ========================
app.pagination.default-size=15
app.inventory.low-stock-threshold=3
app.commission.default-rate=0.02
app.loyalty.points-per-million=100
