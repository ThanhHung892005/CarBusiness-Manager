<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Đơn Hàng | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-file-invoice me-2 text-primary"></i>Quản Lý Đơn Hàng</h4>
            <a th:href="@{/sales/orders/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Tạo Đơn Hàng
            </a>
        </div>

        <!-- Search -->
        <form th:action="@{/sales/orders}" method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                           placeholder="Tìm mã đơn, tên khách hàng...">
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="status">
                        <option value="">-- Trạng thái --</option>
                        <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                                th:selected="${s == selectedStatus}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" class="form-control" name="fromDate" th:value="${fromDate}" placeholder="Từ ngày">
                </div>
                <div class="col-md-2">
                    <input type="date" class="form-control" name="toDate" th:value="${toDate}" placeholder="Đến ngày">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i> Tìm</button>
                    <a th:href="@{/sales/orders}" class="btn btn-outline-secondary">Xóa lọc</a>
                </div>
            </div>
        </form>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Mã Đơn</th>
                            <th>Khách Hàng</th>
                            <th>Nhân Viên</th>
                            <th>Tổng Tiền</th>
                            <th>Trạng Thái</th>
                            <th>Ngày Tạo</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o, iter : ${orders}">
                            <td th:text="${orders.number * orders.size + iter.index + 1}"></td>
                            <td class="font-monospace small fw-semibold" th:text="${o.orderCode}"></td>
                            <td th:text="${o.customer.fullName}"></td>
                            <td class="text-muted small" th:text="${o.employee != null} ? ${o.employee.user.fullName} : '—'"></td>
                            <td class="fw-semibold" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${o.status.name() == 'COMPLETED'} ? 'bg-success' :
                                                      (${o.status.name() == 'CANCELLED'} ? 'bg-danger' :
                                                      (${o.status.name() == 'DELIVERED'} ? 'bg-primary' :
                                                      (${o.status.name() == 'CONFIRMED'} ? 'bg-info' :
                                                      (${o.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-secondary'))))"
                                      th:text="${o.status.name()}"></span>
                            </td>
                            <td class="small" th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/sales/orders/{id}(id=${o.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${orders.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Không có đơn hàng nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${orders.totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${orders.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/sales/orders(keyword=${keyword}, status=${selectedStatus}, fromDate=${fromDate}, toDate=${toDate}, page=${orders.number - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                    th:classappend="${i == orders.number} ? 'active'">
                    <a class="page-link" th:href="@{/sales/orders(keyword=${keyword}, status=${selectedStatus}, fromDate=${fromDate}, toDate=${toDate}, page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${orders.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/sales/orders(keyword=${keyword}, status=${selectedStatus}, fromDate=${fromDate}, toDate=${toDate}, page=${orders.number + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
