<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Tạo Đơn Hàng | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container" style="max-width:800px">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/sales/orders}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h4 class="mb-0">Tạo Đơn Hàng Mới</h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/sales/orders}" th:object="${order}" method="post">
                    <div class="row g-3">
                        <!-- Customer -->
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Khách Hàng <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{customerId}"
                                    th:classappend="${#fields.hasErrors('customerId')} ? 'is-invalid'" required>
                                <option value="">-- Chọn khách hàng --</option>
                                <option th:each="c : ${customers}" th:value="${c.id}"
                                        th:text="${c.customerCode} + ' — ' + ${c.fullName} + ' (' + ${c.phone} + ')'"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{customerId}"></div>
                        </div>

                        <!-- Vehicle -->
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Xe <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{vehicleId}" id="vehicleSelect"
                                    th:classappend="${#fields.hasErrors('vehicleId')} ? 'is-invalid'" required>
                                <option value="">-- Chọn xe (chỉ xe còn hàng) --</option>
                                <option th:each="v : ${availableVehicles}" th:value="${v.id}"
                                        th:data-price="${v.sellingPrice}"
                                        th:text="${v.vin} + ' — ' + ${v.carModel.brand.name} + ' ' + ${v.carModel.name} + ' ' + ${v.carModel.year} + ' (' + ${v.color} + ') — ' + ${#numbers.formatDecimal(v.sellingPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{vehicleId}"></div>
                        </div>

                        <!-- Employee -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nhân Viên Phụ Trách</label>
                            <select class="form-select" th:field="*{employeeId}">
                                <option value="">-- Không chỉ định --</option>
                                <option th:each="e : ${employees}" th:value="${e.id}"
                                        th:text="${e.employeeCode} + ' — ' + ${e.user.fullName}"></option>
                            </select>
                        </div>

                        <!-- Showroom -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Showroom</label>
                            <select class="form-select" th:field="*{showroomId}">
                                <option value="">-- Không xác định --</option>
                                <option th:each="s : ${showrooms}" th:value="${s.id}" th:text="${s.name}"></option>
                            </select>
                        </div>

                        <!-- Price Preview -->
                        <div class="col-md-12" id="priceInfo" style="display:none">
                            <div class="alert alert-info mb-0">
                                <div class="row">
                                    <div class="col">
                                        <small class="text-muted">Giá xe đã chọn</small>
                                        <div class="fw-bold fs-5" id="vehiclePrice">—</div>
                                    </div>
                                    <div class="col">
                                        <small class="text-muted">Giảm giá</small>
                                        <div class="fw-bold fs-5 text-danger" id="discountDisplay">0 ₫</div>
                                    </div>
                                    <div class="col">
                                        <small class="text-muted">Thành tiền</small>
                                        <div class="fw-bold fs-5 text-success" id="totalDisplay">—</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Discount Amount -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Giảm giá (VNĐ)</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{discountAmount}"
                                       min="0" step="500000" placeholder="0" id="discountAmount">
                                <span class="input-group-text">₫</span>
                            </div>
                        </div>

                        <!-- Discount Percent -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Hoặc giảm (%)</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{discountPct}"
                                       min="0" max="100" step="0.5" placeholder="0" id="discountPct">
                                <span class="input-group-text">%</span>
                            </div>
                            <div class="form-text">Chỉ dùng một trong hai loại giảm giá.</div>
                        </div>

                        <!-- Notes -->
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Ghi chú</label>
                            <textarea class="form-control" th:field="*{notes}" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-check me-1"></i>Tạo Đơn Hàng
                        </button>
                        <a th:href="@{/sales/orders}" class="btn btn-outline-secondary btn-lg">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts">
<script>
    $(document).ready(function() {
        function formatVND(n) {
            return new Intl.NumberFormat('vi-VN').format(n) + ' ₫';
        }

        function updateTotal() {
            const $opt = $('#vehicleSelect option:selected');
            const price = parseFloat($opt.data('price')) || 0;
            if (price === 0) {
                $('#priceInfo').hide();
                return;
            }
            $('#priceInfo').show();
            $('#vehiclePrice').text(formatVND(price));

            const discAmt = parseFloat($('#discountAmount').val()) || 0;
            const discPct = parseFloat($('#discountPct').val()) || 0;
            const discount = discAmt > 0 ? discAmt : (price * discPct / 100);
            const total = Math.max(0, price - discount);
            $('#discountDisplay').text(formatVND(discount));
            $('#totalDisplay').text(formatVND(total));
        }

        $('#vehicleSelect').on('change', updateTotal);
        $('#discountAmount').on('input', function() {
            if ($(this).val()) $('#discountPct').val('');
            updateTotal();
        });
        $('#discountPct').on('input', function() {
            if ($(this).val()) $('#discountAmount').val('');
            updateTotal();
        });
    });
</script>
</th:block>
</body>
</html>
