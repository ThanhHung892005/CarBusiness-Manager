<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<title>Dashboard Kinh Doanh</title>
<main>
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-chart-line me-2 text-primary"></i>Dashboard Kinh Doanh</h2>
        <span class="text-muted" th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy')}"></span>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                        <i class="fas fa-car fa-2x text-primary"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Tổng xe trong kho</div>
                        <div class="fw-bold fs-5" th:text="${stats.totalVehicles}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3 me-3">
                        <i class="fas fa-check-circle fa-2x text-success"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Xe có sẵn</div>
                        <div class="fw-bold fs-5" th:text="${stats.availableVehicles}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-info bg-opacity-10 p-3 me-3">
                        <i class="fas fa-file-invoice fa-2x text-info"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Đơn hàng tháng này</div>
                        <div class="fw-bold fs-5" th:text="${stats.ordersThisMonth}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-3">
                        <i class="fas fa-users fa-2x text-warning"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Tổng khách hàng</div>
                        <div class="fw-bold fs-5" th:text="${stats.totalCustomers}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- Quick Actions -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">Thao tác nhanh</div>
                <div class="card-body d-grid gap-2">
                    <a th:href="@{/sales/orders/new}" class="btn btn-success">
                        <i class="fas fa-plus-circle me-1"></i>Tạo đơn hàng mới
                    </a>
                    <a th:href="@{/sales/customers/new}" class="btn btn-outline-primary">
                        <i class="fas fa-user-plus me-1"></i>Thêm khách hàng
                    </a>
                    <a th:href="@{/inventory/vehicles}" class="btn btn-outline-info">
                        <i class="fas fa-car me-1"></i>Xem kho xe
                    </a>
                </div>
            </div>
        </div>
        <!-- Recent Orders -->
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Đơn hàng gần nhất</span>
                    <a th:href="@{/sales/orders}" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr><th>Mã đơn</th><th>Khách hàng</th><th>Tổng tiền</th><th>Trạng thái</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="o : ${recentOrders}">
                            <td><a th:href="@{/sales/orders/{id}(id=${o.id})}" th:text="${o.orderCode}"></a></td>
                            <td th:text="${o.customer.fullName}"></td>
                            <td th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                            <td>
                                <span th:class="${'badge ' + (o.status.name() == 'COMPLETED' ? 'bg-success' :
                                                o.status.name() == 'CONFIRMED' ? 'bg-primary' :
                                                o.status.name() == 'CANCELLED' ? 'bg-danger' : 'bg-secondary')}"
                                      th:text="${o.status}"></span>
                            </td>
                        </tr>
                        <tr th:if="${recentOrders == null or recentOrders.isEmpty()}">
                            <td colspan="4" class="text-center text-muted py-3">Chưa có đơn hàng</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<scripts></scripts>
</html>
