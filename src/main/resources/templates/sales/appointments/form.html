<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Đặt Lịch Hẹn | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container" style="max-width:720px">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/sales/appointments}" class="btn btn-sm btn-outline-secondary me-3"><i class="fas fa-arrow-left"></i></a>
            <h4 class="mb-0">Đặt Lịch Hẹn Dịch Vụ</h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/sales/appointments}" th:object="${appointmentRequest}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Khách Hàng <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{customerId}"
                                    th:classappend="${#fields.hasErrors('customerId')} ? 'is-invalid'" required>
                                <option value="">-- Chọn khách hàng --</option>
                                <option th:each="c : ${customers}" th:value="${c.id}"
                                        th:text="${c.fullName} + ' (' + ${c.phone} + ')'"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{customerId}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Xe <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{vehicleId}"
                                    th:classappend="${#fields.hasErrors('vehicleId')} ? 'is-invalid'" required>
                                <option value="">-- Chọn xe --</option>
                                <option th:each="v : ${vehicles}" th:value="${v.id}"
                                        th:text="${v.vin} + ' — ' + ${v.carModel.brand.name} + ' ' + ${v.carModel.name} + ' (' + ${v.color} + ')'"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{vehicleId}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Loại Dịch Vụ <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{serviceType}"
                                    th:classappend="${#fields.hasErrors('serviceType')} ? 'is-invalid'" required>
                                <option value="">-- Chọn loại dịch vụ --</option>
                                <option th:each="st : ${serviceTypes}" th:value="${st.name()}" th:text="${st.name()}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{serviceType}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ngày & Giờ Hẹn <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" th:field="*{appointmentDate}"
                                   th:classappend="${#fields.hasErrors('appointmentDate')} ? 'is-invalid'" required>
                            <div class="invalid-feedback" th:errors="*{appointmentDate}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nhân Viên Phụ Trách</label>
                            <select class="form-select" th:field="*{employeeId}">
                                <option value="">-- Chưa phân bổ --</option>
                                <option th:each="e : ${employees}" th:value="${e.id}"
                                        th:text="${e.user.fullName} + ' (' + ${e.employeeCode} + ')'"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Showroom</label>
                            <select class="form-select" th:field="*{showroomId}">
                                <option value="">-- Chưa chọn --</option>
                                <option th:each="s : ${showrooms}" th:value="${s.id}" th:text="${s.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Mô Tả Yêu Cầu</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      placeholder="Mô tả vấn đề cần sửa chữa / bảo dưỡng..."></textarea>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Ghi Chú</label>
                            <textarea class="form-control" th:field="*{notes}" rows="2"
                                      placeholder="Ghi chú thêm..."></textarea>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Đặt Lịch</button>
                        <a th:href="@{/sales/appointments}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
