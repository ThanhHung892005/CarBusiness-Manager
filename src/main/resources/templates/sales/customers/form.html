<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title th:text="${customerId == null} ? 'Thêm Khách Hàng | Car Management' : 'Chỉnh Sửa Khách Hàng | Car Management'"></title></head>
<body>
<main th:fragment="main">
    <div class="container" style="max-width:700px">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/sales/customers}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h4 class="mb-0" th:text="${customerId == null} ? 'Thêm Khách Hàng' : 'Chỉnh Sửa Khách Hàng'"></h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="${customerId == null} ? @{/sales/customers} : @{/sales/customers/{id}(id=${customerId})}"
                      th:object="${customer}" method="post">

                    <!-- Corporate toggle -->
                    <div class="mb-3 form-check form-switch">
                        <input type="checkbox" class="form-check-input" th:field="*{isCorporate}" id="isCorporate">
                        <label class="form-check-label fw-semibold" for="isCorporate">Khách hàng doanh nghiệp</label>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   placeholder="Nguyễn Văn A">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                   placeholder="0901234567">
                            <div class="invalid-feedback" th:errors="*{phone}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="example@email.com">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>

                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <input type="text" class="form-control" th:field="*{address}"
                                   placeholder="Số nhà, đường, phường/xã">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Thành phố</label>
                            <input type="text" class="form-control" th:field="*{city}" placeholder="Hà Nội">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">CMND/CCCD</label>
                            <input type="text" class="form-control" th:field="*{idNumber}" placeholder="012345678901">
                        </div>

                        <!-- Corporate fields -->
                        <div class="col-md-6 corporate-field">
                            <label class="form-label fw-semibold">Mã số thuế</label>
                            <input type="text" class="form-control" th:field="*{taxCode}" placeholder="0123456789">
                        </div>

                        <div class="col-md-12 corporate-field">
                            <label class="form-label fw-semibold">Tên công ty</label>
                            <input type="text" class="form-control" th:field="*{companyName}"
                                   placeholder="Công ty TNHH ...">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Ghi chú</label>
                            <textarea class="form-control" th:field="*{notes}" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Lưu
                        </button>
                        <a th:href="@{/sales/customers}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts">
<script>
    $(document).ready(function() {
        function toggleCorporate() {
            if ($('#isCorporate').is(':checked')) {
                $('.corporate-field').show();
            } else {
                $('.corporate-field').hide();
            }
        }
        toggleCorporate();
        $('#isCorporate').on('change', toggleCorporate);
    });
</script>
</th:block>
</body>
</html>
