<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Dashboard Khách Hàng | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container-fluid">
        <h4 class="mb-4"><i class="fas fa-home me-2 text-primary"></i>Trang Cá Nhân</h4>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small opacity-75">Đơn hàng của tôi</div>
                            <div class="fs-3 fw-bold" th:text="${myOrders != null} ? ${myOrders.size()} : '0'">0</div>
                        </div>
                        <i class="fas fa-shopping-cart fa-2x opacity-75"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small opacity-75">Điểm tích lũy</div>
                            <div class="fs-3 fw-bold" th:text="${loyaltyPoints != null} ? ${loyaltyPoints} : '0'">0</div>
                        </div>
                        <i class="fas fa-star fa-2x opacity-75"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-info text-white shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small opacity-75">Lịch hẹn sắp tới</div>
                            <div class="fs-3 fw-bold" th:text="${myAppointments != null} ? ${myAppointments.size()} : '0'">0</div>
                        </div>
                        <i class="fas fa-calendar-check fa-2x opacity-75"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- My Orders -->
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header fw-semibold"><i class="fas fa-receipt me-2"></i>Đơn Hàng Của Tôi</div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0" th:if="${myOrders != null and !myOrders.empty}">
                            <thead class="table-light">
                                <tr><th>Mã đơn</th><th>Tổng tiền</th><th>Trạng thái</th><th>Ngày</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="o : ${myOrders}">
                                    <td class="font-monospace small" th:text="${o.orderCode}"></td>
                                    <td class="small fw-semibold" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${o.status.name() == 'COMPLETED'} ? 'bg-success' :
                                                              (${o.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-warning text-dark')"
                                              th:text="${o.status.name()}"></span>
                                    </td>
                                    <td class="small text-muted" th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy')}"></td>
                                </tr>
                            </tbody>
                        </table>
                        <div th:if="${myOrders == null or myOrders.empty}" class="text-center text-muted py-4">
                            <i class="fas fa-receipt fa-2x mb-2"></i>
                            <p>Chưa có đơn hàng nào</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Appointments & Info -->
            <div class="col-md-5">
                <div class="card shadow-sm mb-3" th:if="${myAppointments != null and !myAppointments.empty}">
                    <div class="card-header fw-semibold"><i class="fas fa-calendar me-2 text-warning"></i>Lịch Hẹn Sắp Tới</div>
                    <div class="card-body p-0">
                        <table class="table table-sm mb-0">
                            <tbody>
                                <tr th:each="a : ${myAppointments}">
                                    <td>
                                        <div class="fw-semibold small" th:text="${a.serviceType}"></div>
                                        <div class="text-muted small" th:text="${#temporals.format(a.appointmentDate, 'dd/MM/yyyy HH:mm')}"></div>
                                    </td>
                                    <td>
                                        <span class="badge bg-info" th:text="${a.status.name()}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header fw-semibold"><i class="fas fa-info-circle me-2"></i>Thông Tin</div>
                    <div class="card-body">
                        <p class="text-muted small mb-2">Để được hỗ trợ, vui lòng liên hệ showroom gần nhất.</p>
                        <a th:href="@{/inventory/vehicles}" class="btn btn-outline-primary btn-sm w-100">
                            <i class="fas fa-car me-2"></i>Xem xe mới nhất
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
