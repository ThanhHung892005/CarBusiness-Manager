<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Hãng Xe - Form</title></head>
<body>
<main th:fragment="main">
    <div class="container" style="max-width:600px">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/admin/brands}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h4 class="mb-0" th:text="${brand.id == null} ? 'Thêm Hãng Xe' : 'Chỉnh Sửa Hãng Xe'"></h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="${brand.id == null} ? @{/admin/brands} : @{/admin/brands/{id}(id=${brand.id})}"
                      th:object="${brand}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên Hãng <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Quốc Gia</label>
                        <input type="text" class="form-control" th:field="*{country}" placeholder="VD: Nhật Bản">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mô Tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                    </div>
                    <div class="mb-3 form-check" th:if="${brand.id != null}">
                        <input type="checkbox" class="form-check-input" th:field="*{active}" id="active">
                        <label class="form-check-label" for="active">Đang hoạt động</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Lưu
                        </button>
                        <a th:href="@{/admin/brands}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
