<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Người Dùng | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-users-cog me-2 text-primary"></i>Quản Lý Người Dùng</h4>
            <a th:href="@{/admin/users/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Thêm Người Dùng
            </a>
        </div>

        <form th:action="@{/admin/users}" method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-md-5">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                           placeholder="Tìm username, họ tên, email...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="roleName">
                        <option value="">-- Tất cả vai trò --</option>
                        <option th:each="r : ${roles}" th:value="${r.name}" th:text="${r.name}"
                                th:selected="${r.name == roleName}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-outline-secondary" type="submit"><i class="fas fa-search"></i></button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Xóa</a>
                </div>
            </div>
        </form>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Họ Tên</th>
                            <th>Email</th>
                            <th>Điện Thoại</th>
                            <th>Vai Trò</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, iter : ${users}">
                            <td th:text="${users.number * users.size + iter.index + 1}"></td>
                            <td class="font-monospace fw-semibold" th:text="${u.username}"></td>
                            <td th:text="${u.fullName}"></td>
                            <td class="small text-muted" th:text="${u.email}"></td>
                            <td class="small" th:text="${u.phone != null} ? ${u.phone} : '—'"></td>
                            <td>
                                <span th:each="role : ${u.roles}"
                                      th:text="${role.name.replace('ROLE_','')}"
                                      th:classappend="${role.name == 'ROLE_ADMIN'} ? 'badge bg-danger me-1' :
                                                      (${role.name == 'ROLE_MANAGER'} ? 'badge bg-warning text-dark me-1' :
                                                      (${role.name == 'ROLE_SALES'} ? 'badge bg-info text-dark me-1' :
                                                      'badge bg-secondary me-1'))">
                                </span>
                            </td>
                            <td>
                                <span th:if="${!u.enabled}" class="badge bg-secondary">Vô hiệu</span>
                                <span th:if="${u.locked}" class="badge bg-danger">Khoá</span>
                                <span th:if="${u.enabled and !u.locked}" class="badge bg-success">Hoạt động</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${users.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Không có dữ liệu</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav th:if="${users.totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${users.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, roleName=${roleName}, page=${users.number - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                    th:classappend="${i == users.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/users(keyword=${keyword}, roleName=${roleName}, page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${users.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, roleName=${roleName}, page=${users.number + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
