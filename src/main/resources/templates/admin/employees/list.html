<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Nhân Viên | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-id-badge me-2 text-primary"></i>Quản Lý Nhân Viên</h4>
            <a th:href="@{/admin/employees/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Thêm Nhân Viên
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/admin/employees}" method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                           placeholder="Tìm mã NV, họ tên, username...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="showroomId">
                        <option value="">-- Tất cả showroom --</option>
                        <option th:each="s : ${showrooms}" th:value="${s.id}" th:text="${s.name}"
                                th:selected="${s.id == selectedShowroomId}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="deptId">
                        <option value="">-- Tất cả phòng ban --</option>
                        <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"
                                th:selected="${d.id == selectedDeptId}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-outline-secondary" type="submit"><i class="fas fa-search"></i></button>
                    <a th:href="@{/admin/employees}" class="btn btn-outline-secondary">Xóa</a>
                </div>
            </div>
        </form>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Mã NV</th>
                            <th>Họ Tên</th>
                            <th>Username</th>
                            <th>Vai Trò</th>
                            <th>Chức Vụ</th>
                            <th>Showroom</th>
                            <th>Lương</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e, iter : ${employees}">
                            <td th:text="${employees.number * employees.size + iter.index + 1}"></td>
                            <td class="font-monospace small fw-semibold" th:text="${e.employeeCode}"></td>
                            <td th:text="${e.user.fullName}"></td>
                            <td class="font-monospace small text-muted" th:text="${e.user.username}"></td>
                            <td>
                                <span th:each="role : ${e.user.roles}"
                                      th:text="${role.name == 'ROLE_GIAM_DOC'} ? 'Giám Đốc' :
                                               (${role.name == 'ROLE_NV_KINH_DOANH'} ? 'NV Kinh Doanh' :
                                               (${role.name == 'ROLE_KE_TOAN'} ? 'Kế Toán' :
                                               (${role.name == 'ROLE_THU_KHO'} ? 'Thủ Kho' : ${role.name})))"
                                      th:class="${role.name == 'ROLE_GIAM_DOC'} ? 'badge bg-danger me-1' :
                                                (${role.name == 'ROLE_NV_KINH_DOANH'} ? 'badge bg-info text-dark me-1' :
                                                (${role.name == 'ROLE_KE_TOAN'} ? 'badge bg-warning text-dark me-1' :
                                                (${role.name == 'ROLE_THU_KHO'} ? 'badge bg-primary me-1' :
                                                'badge bg-secondary me-1')))">
                                </span>
                            </td>
                            <td class="text-muted small" th:text="${e.position}"></td>
                            <td class="small" th:text="${e.showroom != null} ? ${e.showroom.name} : '—'"></td>
                            <td class="small" th:text="${#numbers.formatDecimal(e.salary, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            <td>
                                <span th:if="${!e.user.enabled}" class="badge bg-secondary">Vô hiệu</span>
                                <span th:if="${e.user.locked}" class="badge bg-danger">Khoá</span>
                                <span th:if="${e.user.enabled and !e.user.locked}" class="badge bg-success">Hoạt động</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/employees/{id}/edit(id=${e.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${employees.empty}">
                            <td colspan="10" class="text-center text-muted py-4">Không có dữ liệu</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav th:if="${employees.totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${employees.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/employees(keyword=${keyword}, showroomId=${selectedShowroomId}, deptId=${selectedDeptId}, page=${employees.number - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, employees.totalPages - 1)}"
                    th:classappend="${i == employees.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/employees(keyword=${keyword}, showroomId=${selectedShowroomId}, deptId=${selectedDeptId}, page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${employees.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/employees(keyword=${keyword}, showroomId=${selectedShowroomId}, deptId=${selectedDeptId}, page=${employees.number + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
