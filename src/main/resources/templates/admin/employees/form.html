<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title th:text="${employeeId == null} ? 'Thêm Nhân Viên | Car Management' : 'Chỉnh Sửa Nhân Viên | Car Management'"></title></head>
<body>
<main th:fragment="main">
    <div class="container" style="max-width:700px">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/admin/employees}" class="btn btn-sm btn-outline-secondary me-3"><i class="fas fa-arrow-left"></i></a>
            <h4 class="mb-0" th:text="${employeeId == null} ? 'Thêm Nhân Viên' : 'Chỉnh Sửa Nhân Viên'"></h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="${employeeId == null} ? @{/admin/employees} : @{/admin/employees/{id}(id=${employeeId})}"
                      th:object="${employeeRequest}" method="post">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Mã Nhân Viên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control text-uppercase" th:field="*{employeeCode}"
                                   th:classappend="${#fields.hasErrors('employeeCode')} ? 'is-invalid'"
                                   placeholder="NV001" th:readonly="${employeeId != null}" required>
                            <div class="invalid-feedback" th:errors="*{employeeCode}"></div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Tài Khoản Người Dùng <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{userId}"
                                    th:classappend="${#fields.hasErrors('userId')} ? 'is-invalid'"
                                    th:disabled="${employeeId != null}" required>
                                <option value="">-- Chọn tài khoản --</option>
                                <option th:each="u : ${users}" th:value="${u.id}"
                                        th:text="${u.fullName} + ' (' + ${u.username} + ')'"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{userId}"></div>
                            <div class="form-text" th:if="${employeeId != null}">Không thể thay đổi tài khoản sau khi tạo.</div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Chức Vụ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{position}"
                                   th:classappend="${#fields.hasErrors('position')} ? 'is-invalid'"
                                   placeholder="VD: Nhân viên kinh doanh" required>
                            <div class="invalid-feedback" th:errors="*{position}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ngày Vào Làm <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{hireDate}"
                                   th:classappend="${#fields.hasErrors('hireDate')} ? 'is-invalid'" required>
                            <div class="invalid-feedback" th:errors="*{hireDate}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Lương Cơ Bản <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{salary}" min="0" step="500000" required>
                                <span class="input-group-text">₫</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">% Hoa Hồng</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{commissionRate}"
                                       min="0" max="1" step="0.005" placeholder="0.02">
                                <span class="input-group-text">%</span>
                            </div>
                            <div class="form-text">Nhập dạng thập phân: 0.02 = 2%</div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Showroom</label>
                            <select class="form-select" th:field="*{showroomId}">
                                <option value="">-- Chưa phân bổ --</option>
                                <option th:each="s : ${showrooms}" th:value="${s.id}" th:text="${s.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Phòng Ban</label>
                            <select class="form-select" th:field="*{departmentId}">
                                <option value="">-- Chưa phân bổ --</option>
                                <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Lưu</button>
                        <a th:href="@{/admin/employees}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
