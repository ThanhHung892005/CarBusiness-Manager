<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title th:text="${employeeId == null} ? 'Thêm Nhân Viên | Car Management' : 'Chỉnh Sửa Nhân Viên | Car Management'"></title></head>
<body>
<main th:fragment="main">
    <div class="container" style="max-width:780px">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/admin/employees}" class="btn btn-sm btn-outline-secondary me-3"><i class="fas fa-arrow-left"></i></a>
            <h4 class="mb-0" th:text="${employeeId == null} ? 'Thêm Nhân Viên' : 'Chỉnh Sửa Nhân Viên'"></h4>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="${employeeId == null} ? @{/admin/employees} : @{/admin/employees/{id}(id=${employeeId})}"
              th:object="${employeeRequest}" method="post">

            <!-- ── Tài khoản hệ thống ── -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-semibold">
                    <i class="fas fa-user-shield me-2 text-primary"></i>Tài Khoản Hệ Thống
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Họ Tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   placeholder="Nguyễn Văn A" required>
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Tên Đăng Nhập <span class="text-danger">*</span></label>
                            <input type="text" class="form-control font-monospace" th:field="*{username}"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   th:readonly="${employeeId != null}"
                                   placeholder="nhanvien01" required>
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                            <div class="form-text" th:if="${employeeId != null}">Không thể thay đổi tên đăng nhập.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Mật Khẩu
                                <span class="text-danger" th:if="${employeeId == null}">*</span>
                                <span class="text-muted small fw-normal" th:if="${employeeId != null}">(để trống = giữ nguyên)</span>
                            </label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="Ít nhất 8 ký tự"
                                   th:required="${employeeId == null}">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Vai Trò <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{roleName}"
                                    th:classappend="${#fields.hasErrors('roleName')} ? 'is-invalid'" required>
                                <option value="">-- Chọn vai trò --</option>
                                <option value="ROLE_GIAM_DOC">Giám Đốc</option>
                                <option value="ROLE_NV_KINH_DOANH">NV Kinh Doanh</option>
                                <option value="ROLE_KE_TOAN">Kế Toán</option>
                                <option value="ROLE_THU_KHO">Thủ Kho</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{roleName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="email@example.com" required>
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Điện Thoại</label>
                            <input type="text" class="form-control" th:field="*{phone}" placeholder="0900000000">
                        </div>
                        <div class="col-12" th:if="${employeeId != null}">
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{enabled}" id="enabled">
                                    <label class="form-check-label" for="enabled">Tài khoản hoạt động</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{locked}" id="locked">
                                    <label class="form-check-label text-danger" for="locked">Khoá tài khoản</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Thông tin nhân viên ── -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-semibold">
                    <i class="fas fa-id-badge me-2 text-success"></i>Thông Tin Nhân Viên
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Mã Nhân Viên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control text-uppercase font-monospace" th:field="*{employeeCode}"
                                   th:classappend="${#fields.hasErrors('employeeCode')} ? 'is-invalid'"
                                   th:readonly="${employeeId != null}"
                                   placeholder="NV001" required>
                            <div class="invalid-feedback" th:errors="*{employeeCode}"></div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Chức Vụ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{position}"
                                   th:classappend="${#fields.hasErrors('position')} ? 'is-invalid'"
                                   placeholder="VD: Nhân viên kinh doanh" required>
                            <div class="invalid-feedback" th:errors="*{position}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ngày Vào Làm <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{hireDate}"
                                   th:classappend="${#fields.hasErrors('hireDate')} ? 'is-invalid'" required>
                            <div class="invalid-feedback" th:errors="*{hireDate}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Lương Cơ Bản <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{salary}" min="0" step="500000" required>
                                <span class="input-group-text">₫</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">% Hoa Hồng</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{commissionRate}"
                                       min="0" max="1" step="0.005" placeholder="0.02">
                                <span class="input-group-text">%</span>
                            </div>
                            <div class="form-text">Dạng thập phân: 0.02 = 2%</div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Showroom</label>
                            <select class="form-select" th:field="*{showroomId}">
                                <option value="">-- Chưa phân bổ --</option>
                                <option th:each="s : ${showrooms}" th:value="${s.id}" th:text="${s.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Phòng Ban</label>
                            <select class="form-select" th:field="*{departmentId}">
                                <option value="">-- Chưa phân bổ --</option>
                                <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Lưu</button>
                <a th:href="@{/admin/employees}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
