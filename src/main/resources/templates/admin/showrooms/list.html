<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Showroom | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-store me-2 text-primary"></i>Quản Lý Showroom</h4>
            <a th:href="@{/admin/showrooms/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Thêm Showroom
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Mã</th>
                            <th>Tên Showroom</th>
                            <th>Địa Chỉ</th>
                            <th>Thành Phố</th>
                            <th>Điện Thoại</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s, iter : ${showrooms}">
                            <td th:text="${iter.index + 1}"></td>
                            <td class="font-monospace small fw-semibold" th:text="${s.code}"></td>
                            <td class="fw-semibold" th:text="${s.name}"></td>
                            <td class="small text-muted" th:text="${s.address}"></td>
                            <td th:text="${s.city}"></td>
                            <td th:text="${s.phone}"></td>
                            <td>
                                <span class="badge" th:classappend="${s.active} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${s.active} ? 'Hoạt động' : 'Dừng'"></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/showrooms/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${showrooms.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Không có dữ liệu</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
