<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head>
    <title>Dashboard - Admin</title>
</head>
<body>
<main th:fragment="main">
    <div class="container-fluid">
        <h4 class="mb-4"><i class="fas fa-tachometer-alt me-2 text-primary"></i>Dashboard Quản Trị</h4>

        <!-- Stats Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Tổng Xe</div>
                                <div class="fs-3 fw-bold" th:text="${stats.totalVehicles}">0</div>
                            </div>
                            <i class="fas fa-car fa-2x opacity-75"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-success text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Khách Hàng</div>
                                <div class="fs-3 fw-bold" th:text="${stats.totalCustomers}">0</div>
                            </div>
                            <i class="fas fa-users fa-2x opacity-75"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-warning text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Đơn Hàng Tháng Này</div>
                                <div class="fs-3 fw-bold" th:text="${stats.ordersThisMonth}">0</div>
                            </div>
                            <i class="fas fa-file-invoice fa-2x opacity-75"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-info text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small">Doanh Thu Tháng Này</div>
                                <div class="fs-4 fw-bold"
                                     th:text="${#numbers.formatDecimal(stats.revenueThisMonth, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</div>
                            </div>
                            <i class="fas fa-chart-line fa-2x opacity-75"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-5">
                <div class="card shadow-sm h-100">
                    <div class="card-header fw-semibold">
                        <i class="fas fa-chart-pie me-2 text-primary"></i>Phân Bổ Xe Theo Trạng Thái
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center">
                        <canvas id="vehicleStatusChart" style="max-height:220px"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span class="fw-semibold"><i class="fas fa-chart-bar me-2 text-success"></i>Doanh Thu Theo Tháng</span>
                        <div class="d-flex gap-2">
                            <select id="adminRevenueYear" class="form-select form-select-sm" style="width:100px">
                                <option th:each="y : ${#numbers.sequence(2026, 2023, -1)}" th:value="${y}" th:text="${y}"></option>
                            </select>
                            <a th:href="@{/manager/reports}" class="btn btn-sm btn-outline-success">
                                <i class="fas fa-file-excel"></i>
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <canvas id="adminRevenueChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Links -->
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-semibold">
                        <i class="fas fa-bolt me-2 text-warning"></i>Thao Tác Nhanh
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a th:href="@{/inventory/vehicles/new}" class="btn btn-outline-primary">
                                <i class="fas fa-plus me-2"></i>Thêm Xe Mới
                            </a>
                            <a th:href="@{/sales/customers/new}" class="btn btn-outline-success">
                                <i class="fas fa-user-plus me-2"></i>Thêm Khách Hàng
                            </a>
                            <a th:href="@{/sales/orders/new}" class="btn btn-outline-warning">
                                <i class="fas fa-file-plus me-2"></i>Tạo Đơn Hàng
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-semibold">
                        <i class="fas fa-info-circle me-2 text-info"></i>Thông Tin Hệ Thống
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr>
                                <td class="text-muted">Nhân viên</td>
                                <td class="fw-semibold" th:text="${stats.totalEmployees}">0</td>
                            </tr>
                            <tr>
                                <td class="text-muted">Showroom</td>
                                <td class="fw-semibold" th:text="${stats.totalShowrooms}">0</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts">
<script>
(function() {
    // Doughnut — vehicle status
    fetch('/api/stats/vehicle-status')
        .then(r => r.json())
        .then(d => {
            new Chart(document.getElementById('vehicleStatusChart'), {
                type: 'doughnut',
                data: { labels: d.labels, datasets: [{ data: d.data, backgroundColor: d.colors, borderWidth: 2 }] },
                options: { plugins: { legend: { position: 'bottom' } }, cutout: '60%' }
            });
        });

    // Bar — monthly revenue
    var revenueCtx = document.getElementById('adminRevenueChart').getContext('2d');
    var revenueChart = new Chart(revenueCtx, {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Doanh thu (VND)', data: [], backgroundColor: 'rgba(40,167,69,0.7)', borderColor: '#28a745', borderWidth: 1 }] },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return (v/1e6).toFixed(0) + ' tr'; } } } }
        }
    });

    function loadRevenue(year) {
        fetch('/api/stats/revenue-monthly?year=' + year)
            .then(r => r.json())
            .then(d => { revenueChart.data.labels = d.labels; revenueChart.data.datasets[0].data = d.data; revenueChart.update(); });
    }

    var yearSel = document.getElementById('adminRevenueYear');
    loadRevenue(yearSel.value);
    yearSel.addEventListener('change', function() { loadRevenue(this.value); });
})();
</script>
</th:block>
</body>
</html>
