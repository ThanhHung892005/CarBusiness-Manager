<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Chấm Công | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-calendar-check me-2 text-primary"></i>Quản Lý Chấm Công</h4>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/hr/payroll}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-money-bill me-1"></i>Bảng Lương
                </a>
                <a th:href="@{/admin/hr/attendance/new}" class="btn btn-primary">
                    <i class="fas fa-plus me-1"></i>Thêm Chấm Công
                </a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter -->
        <form th:action="@{/admin/hr/attendance}" method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-md-4">
                    <select class="form-select" name="employeeId">
                        <option value="">-- Tất cả nhân viên --</option>
                        <option th:each="emp : ${employees}"
                                th:value="${emp.id}"
                                th:text="${emp.user.fullName + ' (' + emp.employeeCode + ')'}"
                                th:selected="${emp.id == selectedEmployeeId}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="month">
                        <option th:each="m : ${months}" th:value="${m}"
                                th:text="'Tháng ' + ${m}"
                                th:selected="${m == selectedMonth}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control" name="year" th:value="${selectedYear}"
                           min="2020" max="2099" placeholder="Năm">
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-outline-secondary" type="submit"><i class="fas fa-search"></i> Lọc</button>
                    <a th:href="@{/admin/hr/attendance}" class="btn btn-outline-secondary">Xóa</a>
                </div>
            </div>
        </form>

        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-semibold">
                    Tháng <span th:text="${selectedMonth}"></span>/<span th:text="${selectedYear}"></span>
                </span>
                <span class="text-muted small" th:text="${attendances.totalElements} + ' bản ghi'"></span>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Ngày</th>
                            <th>Nhân Viên</th>
                            <th>Vào</th>
                            <th>Ra</th>
                            <th>Trạng Thái</th>
                            <th>Ghi Chú</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${attendances}">
                            <td class="fw-semibold" th:text="${#temporals.format(a.date, 'dd/MM/yyyy (EEE)', new java.util.Locale('vi'))}"></td>
                            <td th:text="${a.employee.user.fullName}"></td>
                            <td class="font-monospace small" th:text="${a.checkIn != null ? #temporals.format(a.checkIn, 'HH:mm') : '—'}"></td>
                            <td class="font-monospace small" th:text="${a.checkOut != null ? #temporals.format(a.checkOut, 'HH:mm') : '—'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${a.status.name() == 'PRESENT'} ? 'bg-success' :
                                                      (${a.status.name() == 'LATE'} ? 'bg-warning text-dark' :
                                                      (${a.status.name() == 'HALF_DAY'} ? 'bg-info' :
                                                      (${a.status.name() == 'LEAVE'} ? 'bg-primary' : 'bg-danger')))"
                                      th:text="${a.status.displayName}"></span>
                            </td>
                            <td class="small text-muted" th:text="${a.notes}"></td>
                            <td>
                                <a th:href="@{/admin/hr/attendance/{id}/edit(id=${a.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${attendances.empty}">
                            <td colspan="7" class="text-center text-muted py-4">Không có dữ liệu chấm công</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav th:if="${attendances.totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${attendances.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/hr/attendance(employeeId=${selectedEmployeeId}, month=${selectedMonth}, year=${selectedYear}, page=${attendances.number - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, attendances.totalPages - 1)}"
                    th:classappend="${i == attendances.number} ? 'active'">
                    <a class="page-link" th:href="@{/admin/hr/attendance(employeeId=${selectedEmployeeId}, month=${selectedMonth}, year=${selectedYear}, page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${attendances.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/hr/attendance(employeeId=${selectedEmployeeId}, month=${selectedMonth}, year=${selectedYear}, page=${attendances.number + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
