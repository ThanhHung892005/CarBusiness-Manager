<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Chấm Công | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>
                <i class="fas fa-calendar-check me-2 text-primary"></i>
                <span th:if="${attendanceId != null}">Sửa Chấm Công</span>
                <span th:if="${attendanceId == null}">Thêm Chấm Công</span>
            </h4>
            <a th:href="@{/admin/hr/attendance}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>Quay Lại
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="${attendanceId != null} ? @{/admin/hr/attendance/{id}(id=${attendanceId})} : @{/admin/hr/attendance}"
                              th:object="${attendance}" method="post">

                            <!-- Khi sửa: hiển thị nhân viên + ngày, không cho đổi -->
                            <div th:if="${attendanceId != null}" class="alert alert-info small mb-3">
                                <i class="fas fa-info-circle me-1"></i>
                                Nhân viên: <strong th:text="${employeeName}"></strong> —
                                Ngày: <strong th:text="${#temporals.format(attendance.date, 'dd/MM/yyyy')}"></strong>
                                <input type="hidden" th:field="*{employeeId}">
                                <input type="hidden" th:field="*{date}">
                            </div>

                            <!-- Khi tạo mới: chọn nhân viên + ngày -->
                            <div th:if="${attendanceId == null}" class="row g-3 mb-3">
                                <div class="col-md-7">
                                    <label class="form-label fw-semibold">Nhân Viên <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{employeeId}"
                                            th:classappend="${#fields.hasErrors('employeeId')} ? 'is-invalid'">
                                        <option value="">-- Chọn nhân viên --</option>
                                        <option th:each="emp : ${employees}"
                                                th:value="${emp.id}"
                                                th:text="${emp.user.fullName + ' (' + emp.employeeCode + ')'}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{employeeId}"></div>
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label fw-semibold">Ngày <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" th:field="*{date}"
                                           th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{date}"></div>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Giờ Vào</label>
                                    <input type="time" class="form-control" th:field="*{checkIn}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Giờ Ra</label>
                                    <input type="time" class="form-control" th:field="*{checkOut}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Trạng Thái <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{status}"
                                            th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'">
                                        <option th:each="s : ${statuses}" th:value="${s.name()}"
                                                th:text="${s.displayName}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Ghi Chú</label>
                                <input type="text" class="form-control" th:field="*{notes}"
                                       placeholder="Lý do đi muộn, nghỉ phép...">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>Lưu
                                </button>
                                <a th:href="@{/admin/hr/attendance}" class="btn btn-outline-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
