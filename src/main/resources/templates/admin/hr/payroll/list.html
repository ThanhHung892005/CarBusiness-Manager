<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Bảng Lương | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-money-bill-wave me-2 text-primary"></i>Quản Lý Bảng Lương</h4>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/hr/attendance}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-calendar-check me-1"></i>Chấm Công
                </a>
                <a th:href="@{/admin/hr/payroll/calculate}" class="btn btn-primary">
                    <i class="fas fa-calculator me-1"></i>Tính Lương
                </a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter -->
        <form th:action="@{/admin/hr/payroll}" method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-md-2">
                    <select class="form-select" name="month">
                        <option value="">-- Tất cả tháng --</option>
                        <option th:each="m : ${months}" th:value="${m}"
                                th:text="'Tháng ' + ${m}"
                                th:selected="${m == selectedMonth}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control" name="year" th:value="${selectedYear}"
                           th:placeholder="${currentYear}" min="2020" max="2099">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.displayName}"
                                th:selected="${s == selectedStatus}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-outline-secondary" type="submit"><i class="fas fa-search"></i> Lọc</button>
                    <a th:href="@{/admin/hr/payroll}" class="btn btn-outline-secondary">Xóa</a>
                </div>
            </div>
        </form>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tháng/Năm</th>
                            <th>Nhân Viên</th>
                            <th class="text-center">Công</th>
                            <th class="text-end">Lương cơ bản</th>
                            <th class="text-end">Hoa hồng</th>
                            <th class="text-end">Lương thực nhận</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${payrolls}">
                            <td class="fw-semibold">
                                T<span th:text="${p.month}"></span>/<span th:text="${p.year}"></span>
                            </td>
                            <td th:text="${p.employee.user.fullName}"></td>
                            <td class="text-center small">
                                <span th:text="${p.effectiveDays}"></span>/<span th:text="${p.workDays}"></span>
                            </td>
                            <td class="text-end small" th:text="${#numbers.formatDecimal(p.baseSalary, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            <td class="text-end small" th:text="${#numbers.formatDecimal(p.commission, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            <td class="text-end fw-semibold text-primary"
                                th:text="${#numbers.formatDecimal(p.netSalary, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${p.status.name() == 'DRAFT'} ? 'bg-secondary' :
                                                      (${p.status.name() == 'APPROVED'} ? 'bg-warning text-dark' : 'bg-success')"
                                      th:text="${p.status.displayName}"></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/hr/payroll/{id}(id=${p.id})}" class="btn btn-sm btn-outline-info">
                                    <i class="fas fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${payrolls.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Chưa có bảng lương nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav th:if="${payrolls.totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${payrolls.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/hr/payroll(month=${selectedMonth}, year=${selectedYear}, status=${selectedStatus}, page=${payrolls.number - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, payrolls.totalPages - 1)}"
                    th:classappend="${i == payrolls.number} ? 'active'">
                    <a class="page-link" th:href="@{/admin/hr/payroll(month=${selectedMonth}, year=${selectedYear}, status=${selectedStatus}, page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${payrolls.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/hr/payroll(month=${selectedMonth}, year=${selectedYear}, status=${selectedStatus}, page=${payrolls.number + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
