<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Chi Tiết Lương | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/hr/payroll}">Bảng Lương</a></li>
                    <li class="breadcrumb-item active"
                        th:text="'T' + ${payroll.month} + '/' + ${payroll.year} + ' — ' + ${payroll.employee.user.fullName}"></li>
                </ol>
            </nav>
            <a th:href="@{/admin/hr/payroll}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Quay Lại
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <!-- Left: Payroll breakdown -->
            <div class="col-md-7">
                <div class="card shadow-sm mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span class="fw-semibold">
                            <i class="fas fa-file-invoice-dollar me-1"></i>
                            Phiếu Lương Tháng <span th:text="${payroll.month}"></span>/<span th:text="${payroll.year}"></span>
                        </span>
                        <span class="badge"
                              th:classappend="${payroll.status.name() == 'DRAFT'} ? 'bg-secondary' :
                                              (${payroll.status.name() == 'APPROVED'} ? 'bg-warning text-dark' : 'bg-success')"
                              th:text="${payroll.status.displayName}"></span>
                    </div>
                    <div class="card-body">
                        <dl class="row small mb-3">
                            <dt class="col-5 text-muted">Nhân viên</dt>
                            <dd class="col-7 fw-semibold" th:text="${payroll.employee.user.fullName}"></dd>
                            <dt class="col-5 text-muted">Mã nhân viên</dt>
                            <dd class="col-7" th:text="${payroll.employee.employeeCode}"></dd>
                            <dt class="col-5 text-muted">Chức vụ</dt>
                            <dd class="col-7" th:text="${payroll.employee.position}"></dd>
                        </dl>

                        <table class="table table-sm table-borderless">
                            <tbody>
                                <tr>
                                    <td class="text-muted">Ngày công chuẩn</td>
                                    <td class="text-end fw-semibold" th:text="${payroll.workDays} + ' ngày'"></td>
                                </tr>
                                <tr>
                                    <td class="text-muted">Ngày công thực tế</td>
                                    <td class="text-end fw-semibold text-primary" th:text="${payroll.effectiveDays} + ' ngày'"></td>
                                </tr>
                                <tr><td colspan="2"><hr class="my-1"></td></tr>
                                <tr>
                                    <td class="text-muted">Lương cơ bản (hợp đồng)</td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(payroll.baseSalary, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                </tr>
                                <tr>
                                    <td class="text-muted ps-3">→ Lương theo công</td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(baseSalaryEarned, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                </tr>
                                <tr class="text-success">
                                    <td>+ Hoa hồng đơn hàng</td>
                                    <td class="text-end fw-semibold" th:text="${#numbers.formatDecimal(payroll.commission, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                </tr>
                                <tr class="text-success">
                                    <td>+ Thưởng</td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(payroll.bonuses, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                </tr>
                                <tr class="text-danger">
                                    <td>- Khấu trừ</td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(payroll.deductions, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                </tr>
                                <tr class="table-primary fw-bold">
                                    <td>LƯƠNG THỰC NHẬN</td>
                                    <td class="text-end fs-5"
                                        th:text="${#numbers.formatDecimal(payroll.netSalary, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:if="${payroll.notes != null and !payroll.notes.isEmpty()}" class="alert alert-light border small mt-2">
                            <i class="fas fa-sticky-note me-1"></i><span th:text="${payroll.notes}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Actions -->
            <div class="col-md-5">
                <!-- Approve/Paid actions -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header fw-semibold"><i class="fas fa-tasks me-1"></i>Hành Động</div>
                    <div class="card-body d-flex flex-column gap-2">
                        <form th:action="@{/admin/hr/payroll/{id}/approve(id=${payroll.id})}" method="post"
                              th:if="${payroll.status.name() != 'PAID'}">
                            <button type="submit" class="btn btn-warning w-100"
                                    th:disabled="${payroll.status.name() == 'APPROVED'}"
                                    onclick="return confirm('Duyệt bảng lương này?')">
                                <i class="fas fa-check me-1"></i>Duyệt Bảng Lương
                            </button>
                        </form>
                        <form th:action="@{/admin/hr/payroll/{id}/paid(id=${payroll.id})}" method="post"
                              th:if="${payroll.status.name() == 'APPROVED'}">
                            <button type="submit" class="btn btn-success w-100"
                                    onclick="return confirm('Xác nhận đã thanh toán lương?')">
                                <i class="fas fa-money-bill-wave me-1"></i>Đã Thanh Toán
                            </button>
                        </form>
                        <a th:href="@{/admin/hr/payroll/calculate}" class="btn btn-outline-secondary btn-sm">
                            <i class="fas fa-sync me-1"></i>Tính Lại
                        </a>
                    </div>
                </div>

                <!-- Edit commission/bonuses/deductions -->
                <div class="card shadow-sm" th:if="${payroll.status.name() != 'PAID'}">
                    <div class="card-header fw-semibold"><i class="fas fa-edit me-1"></i>Điều Chỉnh</div>
                    <div class="card-body">
                        <form th:action="@{/admin/hr/payroll/{id}(id=${payroll.id})}"
                              th:object="${updateForm}" method="post">
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Hoa hồng (đ)</label>
                                <input type="number" class="form-control form-control-sm" th:field="*{commission}"
                                       th:value="${payroll.commission}" min="0" step="1000">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Thưởng (đ)</label>
                                <input type="number" class="form-control form-control-sm" th:field="*{bonuses}"
                                       th:value="${payroll.bonuses}" min="0" step="1000">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Khấu trừ (đ)</label>
                                <input type="number" class="form-control form-control-sm" th:field="*{deductions}"
                                       th:value="${payroll.deductions}" min="0" step="1000">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Ghi chú</label>
                                <textarea class="form-control form-control-sm" th:field="*{notes}" rows="2"
                                          th:text="${payroll.notes}"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100">
                                <i class="fas fa-save me-1"></i>Cập Nhật & Tính Lại
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
