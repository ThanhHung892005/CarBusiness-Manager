<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, main, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Car Management System</title>
    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}" sec:authorize="hasRole('GIAM_DOC')">
            <i class="fas fa-car me-2"></i>Đại Lý Xe
        </a>
        <a class="navbar-brand fw-bold" th:href="@{/sales/dashboard}" sec:authorize="hasRole('NV_KINH_DOANH')">
            <i class="fas fa-car me-2"></i>Đại Lý Xe
        </a>
        <a class="navbar-brand fw-bold" th:href="@{/ke-toan/dashboard}" sec:authorize="hasRole('KE_TOAN')">
            <i class="fas fa-car me-2"></i>Đại Lý Xe
        </a>
        <a class="navbar-brand fw-bold" th:href="@{/inventory/dashboard}" sec:authorize="hasRole('THU_KHO')">
            <i class="fas fa-car me-2"></i>Đại Lý Xe
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasAnyRole('GIAM_DOC','NV_KINH_DOANH','THU_KHO')">
                    <a class="nav-link" th:href="@{/inventory/vehicles}"><i class="fas fa-car me-1"></i>Kho Xe</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('GIAM_DOC','NV_KINH_DOANH')">
                    <a class="nav-link" th:href="@{/crm/leads}"><i class="fas fa-address-book me-1"></i>CRM</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('GIAM_DOC','NV_KINH_DOANH')">
                    <a class="nav-link" th:href="@{/sales/customers}"><i class="fas fa-users me-1"></i>Khách Hàng</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('GIAM_DOC','NV_KINH_DOANH')">
                    <a class="nav-link" th:href="@{/sales/orders}"><i class="fas fa-file-invoice me-1"></i>Đơn Hàng</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('GIAM_DOC','KE_TOAN')">
                    <a class="nav-link" th:href="@{/ke-toan/invoices}"><i class="fas fa-receipt me-1"></i>Tài Chính</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('GIAM_DOC','KE_TOAN')">
                    <a class="nav-link" th:href="@{/manager/reports}"><i class="fas fa-chart-bar me-1"></i>Báo Cáo</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="hasRole('GIAM_DOC')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="fas fa-cog me-1"></i>Quản Trị
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/admin/employees}">
                            <i class="fas fa-id-badge me-1"></i>Nhân Viên</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/showrooms}">
                            <i class="fas fa-store me-1"></i>Showroom</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/admin/brands}">
                            <i class="fas fa-trademark me-1"></i>Hãng Xe</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/models}">
                            <i class="fas fa-list me-1"></i>Dòng Xe</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/admin/audit-logs}">
                            <i class="fas fa-history me-1"></i>Audit Log</a></li>
                    </ul>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="fas fa-sign-out-alt me-1"></i>Đăng Xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Flash Messages -->
<div class="container mt-3" th:if="${success != null or error != null}">
    <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${success}">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Main Content -->
<main class="container-fluid py-3" th:replace="${main}">
    <!-- Page content here -->
</main>

<!-- Footer -->
<footer class="footer mt-auto py-3 bg-light border-top">
    <div class="container text-center">
        <span class="text-muted">Car Management System &copy; 2025</span>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
