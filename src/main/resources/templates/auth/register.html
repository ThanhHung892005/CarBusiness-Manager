<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Car Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; }
        .register-card { border-radius: 16px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="d-flex align-items-center py-4">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <i class="fas fa-car fa-3x text-white mb-2"></i>
                <h3 class="text-white fw-bold">Car Management System</h3>
                <p class="text-white-50">Tạo tài khoản khách hàng</p>
            </div>
            <div class="card register-card shadow-lg">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-4">
                        <i class="fas fa-user-plus me-2 text-primary"></i>Đăng Ký Tài Khoản
                    </h5>
                    <form th:action="@{/register}" th:object="${registrationRequest}" method="post" novalidate>
                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="Tối thiểu 4 ký tự, chỉ chữ cái/số/_">
                                <div class="invalid-feedback" th:errors="*{username}"></div>
                            </div>
                        </div>
                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="example@email.com">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                        </div>
                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{fullName}"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="Nguyễn Văn A">
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>
                        </div>
                        <!-- Phone -->
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{phone}"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                       placeholder="0912345678">
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>
                        </div>
                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control"
                                       th:field="*{password}"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Ít nhất 8 ký tự">
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>
                            <small class="text-muted">Tối thiểu 8 ký tự, có ít nhất 1 chữ hoa và 1 chữ số</small>
                        </div>
                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control"
                                       th:field="*{confirmPassword}"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                       placeholder="Nhập lại mật khẩu">
                                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-user-plus me-2"></i>Đăng Ký
                        </button>
                    </form>
                    <hr class="my-3">
                    <p class="text-center mb-0 text-muted">
                        Đã có tài khoản?
                        <a th:href="@{/login}" class="text-primary fw-semibold">Đăng nhập tại đây</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
