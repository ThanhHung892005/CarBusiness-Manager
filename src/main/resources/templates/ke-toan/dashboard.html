<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<title>Dashboard Kế Toán</title>
<main>
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-calculator me-2 text-success"></i>Dashboard Kế Toán</h2>
        <span class="text-muted" th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy')}"></span>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3 me-3">
                        <i class="fas fa-money-bill-wave fa-2x text-success"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Doanh thu tháng này</div>
                        <div class="fw-bold fs-5"
                             th:text="${revenueThisMonth != null ? #numbers.formatDecimal(revenueThisMonth, 0, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                        <i class="fas fa-file-invoice fa-2x text-primary"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Đơn hàng tháng này</div>
                        <div class="fw-bold fs-5" th:text="${ordersThisMonth}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-3">
                        <i class="fas fa-receipt fa-2x text-warning"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Quản lý hóa đơn</div>
                        <a th:href="@{/ke-toan/invoices}" class="btn btn-sm btn-outline-warning mt-1">Xem danh sách</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">Thao tác nhanh</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-3">
                    <a th:href="@{/ke-toan/invoices}" class="btn btn-outline-success w-100">
                        <i class="fas fa-list me-1"></i>Danh sách hóa đơn
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/ke-toan/invoices(status='UNPAID')}" class="btn btn-outline-danger w-100">
                        <i class="fas fa-exclamation-circle me-1"></i>Chưa thanh toán
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/ke-toan/invoices(status='PARTIAL')}" class="btn btn-outline-warning w-100">
                        <i class="fas fa-hourglass-half me-1"></i>Thanh toán một phần
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/manager/reports}" class="btn btn-outline-primary w-100">
                        <i class="fas fa-chart-bar me-1"></i>Báo cáo doanh thu
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<scripts></scripts>
</html>
