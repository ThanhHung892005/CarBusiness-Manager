<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<title>Quản lý Hóa Đơn</title>
<main>
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3><i class="fas fa-receipt me-2 text-success"></i>Hóa Đơn</h3>
    </div>

    <!-- Search -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/ke-toan/invoices}" method="get" class="row g-2 align-items-end">
                <div class="col-md-5">
                    <input type="text" name="keyword" class="form-control"
                           placeholder="Tìm mã hóa đơn, mã đơn hàng..."
                           th:value="${keyword}">
                </div>
                <div class="col-md-3">
                    <select name="status" class="form-select">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option th:each="s : ${statuses}" th:value="${s}"
                                th:text="${s}" th:selected="${s == selectedStatus}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-search me-1"></i>Tìm
                    </button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/ke-toan/invoices}" class="btn btn-outline-secondary w-100">Xóa lọc</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Mã hóa đơn</th>
                    <th>Mã đơn hàng</th>
                    <th>Khách hàng</th>
                    <th>Tổng tiền</th>
                    <th>Đã thanh toán</th>
                    <th>Còn lại</th>
                    <th>Trạng thái</th>
                    <th>Ngày lập</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inv : ${invoices.content}" th:if="${!invoices.content.isEmpty()}">
                    <td th:text="${inv.invoiceCode}" class="fw-semibold"></td>
                    <td th:text="${inv.order.orderCode}"></td>
                    <td th:text="${inv.order.customer.fullName}"></td>
                    <td th:text="${#numbers.formatDecimal(inv.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                    <td th:text="${#numbers.formatDecimal(inv.paidAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                    <td>
                        <span th:text="${#numbers.formatDecimal(inv.remaining, 0, 'COMMA', 0, 'POINT') + ' ₫'}"
                              th:class="${inv.remaining.signum() > 0 ? 'text-danger fw-semibold' : 'text-success'}">
                        </span>
                    </td>
                    <td>
                        <span th:class="${inv.status.name() == 'PAID' ? 'badge bg-success' :
                                         inv.status.name() == 'PARTIAL' ? 'badge bg-warning text-dark' : 'badge bg-danger'}"
                              th:text="${inv.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(inv.issuedDate, 'dd/MM/yyyy')}"></td>
                    <td>
                        <a th:href="@{/ke-toan/invoices/{id}(id=${inv.id})}"
                           class="btn btn-sm btn-outline-primary">Chi tiết</a>
                    </td>
                </tr>
                <tr th:if="${invoices.content.isEmpty()}">
                    <td colspan="9" class="text-center text-muted py-4">Không có hóa đơn nào</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${invoices.totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${invoices.first} ? 'disabled'">
                <a class="page-link" th:href="@{/ke-toan/invoices(page=${invoices.number - 1}, keyword=${keyword}, status=${selectedStatus})}">«</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, invoices.totalPages - 1)}"
                th:classappend="${i == invoices.number} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/ke-toan/invoices(page=${i}, keyword=${keyword}, status=${selectedStatus})}"></a>
            </li>
            <li class="page-item" th:classappend="${invoices.last} ? 'disabled'">
                <a class="page-link" th:href="@{/ke-toan/invoices(page=${invoices.number + 1}, keyword=${keyword}, status=${selectedStatus})}">»</a>
            </li>
        </ul>
    </nav>
</div>
</main>
<scripts></scripts>
</html>
