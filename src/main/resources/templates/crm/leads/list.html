<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Danh Sách Leads | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-address-book me-2 text-primary"></i>Quản Lý Leads</h4>
            <a th:href="@{/crm/leads/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Thêm Lead
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search & Filter -->
        <form th:action="@{/crm/leads}" method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                           placeholder="Tên, số điện thoại...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.displayName}"
                                th:selected="${s == selectedStatus}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="source">
                        <option value="">-- Tất cả nguồn --</option>
                        <option th:each="src : ${sources}" th:value="${src.name()}" th:text="${src.displayName}"
                                th:selected="${src == selectedSource}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-outline-secondary" type="submit"><i class="fas fa-search"></i> Tìm</button>
                    <a th:href="@{/crm/leads}" class="btn btn-outline-secondary">Xóa lọc</a>
                </div>
            </div>
        </form>

        <!-- Stats chips -->
        <div class="d-flex gap-2 flex-wrap mb-3">
            <a th:href="@{/crm/leads(status='NEW')}" class="badge bg-secondary text-decoration-none fs-6">Mới</a>
            <a th:href="@{/crm/leads(status='CONTACTED')}" class="badge bg-info text-decoration-none fs-6">Đã liên hệ</a>
            <a th:href="@{/crm/leads(status='TEST_DRIVE')}" class="badge bg-primary text-decoration-none fs-6">Lái thử</a>
            <a th:href="@{/crm/leads(status='NEGOTIATING')}" class="badge bg-warning text-dark text-decoration-none fs-6">Đàm phán</a>
            <a th:href="@{/crm/leads(status='CLOSED_WON')}" class="badge bg-success text-decoration-none fs-6">Thành công</a>
            <a th:href="@{/crm/leads(status='CLOSED_LOST')}" class="badge bg-danger text-decoration-none fs-6">Thất bại</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Họ Tên</th>
                            <th>Điện Thoại</th>
                            <th>Email</th>
                            <th>Nguồn</th>
                            <th>Trạng Thái</th>
                            <th>NV Phụ Trách</th>
                            <th>Ngày Tạo</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="l, iter : ${leads}">
                            <td th:text="${leads.number * leads.size + iter.index + 1}"></td>
                            <td class="fw-semibold">
                                <a th:href="@{/crm/leads/{id}(id=${l.id})}" class="text-decoration-none"
                                   th:text="${l.fullName}"></a>
                            </td>
                            <td th:text="${l.phone}"></td>
                            <td class="small text-muted" th:text="${l.email}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${l.source.name() == 'FACEBOOK'} ? 'bg-primary' :
                                                      (${l.source.name() == 'WALK_IN'} ? 'bg-success' :
                                                      (${l.source.name() == 'REFERRAL'} ? 'bg-info' : 'bg-secondary'))"
                                      th:text="${l.source.displayName}"></span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${l.status.name() == 'NEW'} ? 'bg-secondary' :
                                                      (${l.status.name() == 'CONTACTED'} ? 'bg-info' :
                                                      (${l.status.name() == 'TEST_DRIVE'} ? 'bg-primary' :
                                                      (${l.status.name() == 'NEGOTIATING'} ? 'bg-warning text-dark' :
                                                      (${l.status.name() == 'CLOSED_WON'} ? 'bg-success' : 'bg-danger'))))"
                                      th:text="${l.status.displayName}"></span>
                            </td>
                            <td class="small">
                                <span th:if="${l.assignedEmployee != null}" th:text="${l.assignedEmployee.user.fullName}"></span>
                                <span th:if="${l.assignedEmployee == null}" class="text-muted">—</span>
                            </td>
                            <td class="small text-muted"
                                th:text="${#temporals.format(l.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <a th:href="@{/crm/leads/{id}(id=${l.id})}" class="btn btn-sm btn-outline-info me-1">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/crm/leads/{id}/edit(id=${l.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${leads.empty}">
                            <td colspan="9" class="text-center text-muted py-4">Không có lead nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${leads.totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${leads.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/crm/leads(keyword=${keyword}, status=${selectedStatus}, source=${selectedSource}, page=${leads.number - 1})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, leads.totalPages - 1)}"
                    th:classappend="${i == leads.number} ? 'active'">
                    <a class="page-link" th:href="@{/crm/leads(keyword=${keyword}, status=${selectedStatus}, source=${selectedSource}, page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${leads.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/crm/leads(keyword=${keyword}, status=${selectedStatus}, source=${selectedSource}, page=${leads.number + 1})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
