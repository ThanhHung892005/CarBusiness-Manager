<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head><title>Lead | Car Management</title></head>
<body>
<main th:fragment="main">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>
                <i class="fas fa-address-book me-2 text-primary"></i>
                <span th:if="${leadId != null}">Chỉnh Sửa Lead</span>
                <span th:if="${leadId == null}">Thêm Lead Mới</span>
            </h4>
            <a th:href="@{/crm/leads}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>Quay Lại
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="${leadId != null} ? @{/crm/leads/{id}(id=${leadId})} : @{/crm/leads}"
                              th:object="${lead}" method="post">

                            <h6 class="text-muted mb-3"><i class="fas fa-user me-1"></i>Thông Tin Liên Hệ</h6>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ Tên <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{fullName}"
                                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                           placeholder="Nguyễn Văn A">
                                    <div class="invalid-feedback" th:errors="*{fullName}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Điện Thoại <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                           placeholder="0912345678">
                                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" th:field="*{email}"
                                       placeholder="email@example.com">
                            </div>

                            <hr class="my-4">
                            <h6 class="text-muted mb-3"><i class="fas fa-chart-line me-1"></i>Thông Tin CRM</h6>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Nguồn Lead <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{source}"
                                            th:classappend="${#fields.hasErrors('source')} ? 'is-invalid'">
                                        <option value="">-- Chọn nguồn --</option>
                                        <option th:each="src : ${sources}" th:value="${src.name()}"
                                                th:text="${src.displayName}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{source}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Trạng Thái</label>
                                    <select class="form-select" th:field="*{status}">
                                        <option value="">-- Mới (mặc định) --</option>
                                        <option th:each="s : ${statuses}" th:value="${s.name()}"
                                                th:text="${s.displayName}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">NV Phụ Trách</label>
                                <select class="form-select" th:field="*{assignedEmployeeId}">
                                    <option value="">-- Chưa phân công --</option>
                                    <option th:each="emp : ${employees}"
                                            th:value="${emp.id}"
                                            th:text="${emp.user.fullName + ' (' + emp.employeeCode + ')'}"></option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Ghi Chú</label>
                                <textarea class="form-control" th:field="*{notes}" rows="3"
                                          placeholder="Quan tâm dòng xe, ngân sách, yêu cầu đặc biệt..."></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>Lưu
                                </button>
                                <a th:href="@{/crm/leads}" class="btn btn-outline-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
