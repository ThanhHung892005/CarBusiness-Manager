<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<title>Dashboard Kho Xe</title>
<main>
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-warehouse me-2 text-info"></i>Dashboard Thủ Kho</h2>
        <span class="text-muted" th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy')}"></span>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                        <i class="fas fa-car fa-2x text-primary"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Tổng xe trong kho</div>
                        <div class="fw-bold fs-5" th:text="${totalVehicles}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3 me-3">
                        <i class="fas fa-check-circle fa-2x text-success"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Xe có sẵn</div>
                        <div class="fw-bold fs-5" th:text="${available}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-3">
                        <i class="fas fa-clock fa-2x text-warning"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Xe đặt cọc</div>
                        <div class="fw-bold fs-5" th:text="${reserved}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="rounded-circle bg-danger bg-opacity-10 p-3 me-3">
                        <i class="fas fa-tools fa-2x text-danger"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Xe bảo dưỡng</div>
                        <div class="fw-bold fs-5" th:text="${maintenance}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">Thao tác nhanh</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-3">
                    <a th:href="@{/inventory/vehicles/new}" class="btn btn-outline-primary w-100">
                        <i class="fas fa-plus me-1"></i>Nhập xe mới
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/inventory/vehicles}" class="btn btn-outline-info w-100">
                        <i class="fas fa-list me-1"></i>Danh sách xe
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/inventory/vehicles(status='AVAILABLE')}" class="btn btn-outline-success w-100">
                        <i class="fas fa-check-circle me-1"></i>Xe có sẵn
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/inventory/vehicles(status='MAINTENANCE')}" class="btn btn-outline-danger w-100">
                        <i class="fas fa-tools me-1"></i>Xe bảo dưỡng
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<scripts></scripts>
</html>
